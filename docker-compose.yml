version: '3.9'

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: exam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_pass
      POSTGRES_DB: exam_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U exam_user -d exam_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: exam_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_pass
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: exam_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Backend Services ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: exam_auth
    restart: unless-stopped
    env_file: ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://exam_user:exam_pass@postgres:5432/exam_platform
      REDIS_URL: redis://:redis_pass@redis:6379
      PORT: 4001
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth-service/src:/app/src

  exam-service:
    build:
      context: ./services/exam-service
      dockerfile: Dockerfile
    container_name: exam_exam
    restart: unless-stopped
    env_file: ./services/exam-service/.env
    environment:
      DATABASE_URL: postgresql://exam_user:exam_pass@postgres:5432/exam_platform
      REDIS_URL: redis://:redis_pass@redis:6379
      AUTH_SERVICE_URL: http://auth-service:4001
      NOTIFICATION_SERVICE_URL: http://notification-service:4004
      PORT: 4002
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  streaming-service:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    container_name: exam_streaming
    restart: unless-stopped
    env_file: ./services/streaming-service/.env
    environment:
      REDIS_URL: redis://:redis_pass@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      PORT: 4003
    ports:
      - '4003:4003'
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: exam_notification
    restart: unless-stopped
    env_file: ./services/notification-service/.env
    environment:
      REDIS_URL: redis://:redis_pass@redis:6379
      PORT: 4004
    ports:
      - '4004:4004'
    depends_on:
      redis:
        condition: service_healthy

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    container_name: exam_report
    restart: unless-stopped
    env_file: ./services/report-service/.env
    environment:
      DATABASE_URL: postgresql://exam_user:exam_pass@postgres:5432/exam_platform
      REDIS_URL: redis://:redis_pass@redis:6379
      MINIO_ENDPOINT: minio
      PORT: 4005
    ports:
      - '4005:4005'
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: exam_ai
    restart: unless-stopped
    env_file: ./services/ai-service/.env
    environment:
      EXAM_SERVICE_URL: http://exam-service:4002
      STREAMING_SERVICE_URL: http://streaming-service:4003
      PORT: 8000
    ports:
      - '8000:8000'
    volumes:
      - ./services/ai-service/models:/app/models

  # ─── Frontends ────────────────────────────────────────────────────
  student-portal:
    build:
      context: ./apps/student-portal
      dockerfile: Dockerfile
    container_name: exam_student_portal
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001
      NEXT_PUBLIC_EXAM_API_URL: http://localhost:4002
      NEXT_PUBLIC_WS_URL: ws://localhost:4004
      PORT: 3000
    ports:
      - '3000:3000'

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    container_name: exam_admin_dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001
      NEXT_PUBLIC_EXAM_API_URL: http://localhost:4002
      NEXT_PUBLIC_WS_URL: ws://localhost:4004
      NEXT_PUBLIC_STREAMING_URL: ws://localhost:4003
      PORT: 3001
    ports:
      - '3001:3001'

  # ─── Nginx ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: exam_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - exam-service
      - student-portal
      - admin-dashboard

volumes:
  postgres_data:
  redis_data:
  minio_data:
